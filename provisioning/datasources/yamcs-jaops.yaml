apiVersion: 1
prune: true

datasources:
    - name: JAOPS Yamcs Datasource
      uid: jaops-yamcs-main
      type: jaops-yamcs-datasource
      access: proxy
      orgId: 1
      isDefault: false
      editable: true
      version: 1
      jsonData:
          hosts:
              main-host:
                  name: Local Yamcs Quickstart
                  description: Provisioned Quickstart Host
                  path: host.docker.internal:8090
                  tlsEnabled: false
                  tlsInsecure: false
                  authEnabled: false
                  username: admin
                  protobuf: true
          endpoints:
              myproject_realtime:
                  name: Primary
                  description: Provisioned Quickstart Endpoint
                  host: main-host
                  instance: myproject
                  processor: realtime
      secureJsonData:
          main-host-password: admin
