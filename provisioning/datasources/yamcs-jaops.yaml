apiVersion: 1
prune: true

datasources:
    - name: JAOPS Yamcs Datasource
      uid: jaops-yamcs-main
      type: jaops-yamcs-datasource
      access: proxy
      orgId: 1
      isDefault: true
      editable: true
      version: 2
      jsonData:
          hosts:
              main-host:
                  name: Local Yamcs
                  description: Provisioned Quickstart Host
                  path: docker.gateway:8090
                  tlsEnabled: false
                  tlsInsecure: false
                  authEnabled: false
                  username: admin
                  protobuf: true
          endpoints:
              myproject_realtime:
                  name: Quickstart RT
                  description: Provisioned Quickstart realtime processor
                  host: main-host
                  instance: myproject
                  processor: realtime
              myproject_replay:
                  name: Quickstart Replay
                  description: Provisioned Quickstart replay processor
                  host: main-host
                  instance: myproject
                  processor: replay
              simulator_realtime:
                  name: Simulator RT
                  description: Provisioned simulator realtime processor
                  host: main-host
                  instance: simulator
                  processor: realtime
              simulator_replay:
                  name: Simulator Replay
                  description: Provisioned simulator replay processor
                  host: main-host
                  instance: simulator
                  processor: replay
      secureJsonData:
          main-host-password: admin
