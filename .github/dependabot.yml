version: 2

multi-ecosystem-groups:
  ci-infrastructure:
    open-pull-requests-limit: 3
    schedule:
      interval: weekly
      day: monday
      time: "00:30"
      timezone: "UTC"

updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "00:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security
      - go
    groups:
      go-patch-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "00:15"
      timezone: "UTC"
    open-pull-requests-limit: 3
    allow:
      - dependency-type: "production"
    labels:
      - dependencies
      - security
      - node
    groups:
      npm-patch-minor:
        update-types:
          - patch
          - minor

  - package-ecosystem: docker
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: ci-infrastructure
    labels:
      - dependencies
      - security
      - docker

  - package-ecosystem: github-actions
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: ci-infrastructure
    labels:
      - dependencies
      - security
      - ci
