name: Security Audit

'on':
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  audit:
    name: Weekly vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        id: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          set +e
          govulncheck -json ./... > govulncheck.json 2>&1
          gov_json_status=$?
          govulncheck ./... | tee govulncheck.txt
          gov_txt_status=$?
          if [ "$gov_txt_status" -ne 0 ]; then
            exit "$gov_txt_status"
          fi
          exit "$gov_json_status"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run pnpm audit (high+)
        id: pnpm-audit
        continue-on-error: true
        run: |
          set +e
          pnpm audit --audit-level=high --json > pnpm-audit.json 2>&1
          status=$?
          if jq -e . pnpm-audit.json >/dev/null 2>&1; then
            jq . pnpm-audit.json > pnpm-audit.txt
          else
            cp pnpm-audit.json pnpm-audit.txt
          fi
          exit "$status"

      - name: Run OSV-Scanner
        id: osv-scanner
        continue-on-error: true
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          set +e
          osv-scanner scan --recursive . --format json > osv-scanner.json 2>&1
          status=$?
          if jq -e . osv-scanner.json >/dev/null 2>&1; then
            jq . osv-scanner.json > osv-scanner.txt
          else
            cp osv-scanner.json osv-scanner.txt
          fi
          exit "$status"

      - name: Run Trivy filesystem scan
        id: trivy
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload raw audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports-${{ github.run_id }}
          path: |
            govulncheck.txt
            govulncheck.json
            pnpm-audit.txt
            pnpm-audit.json
            osv-scanner.txt
            osv-scanner.json
            trivy-results.sarif
          retention-days: 14

      - name: Evaluate audit status
        id: evaluate
        if: always()
        run: |
          failed=false
          summary=""

          if [ "${{ steps.govulncheck.outcome }}" != "success" ]; then
            failed=true
            summary="${summary}\n- govulncheck reported issues or failed"
          fi

          if [ "${{ steps.pnpm-audit.outcome }}" != "success" ]; then
            failed=true
            summary="${summary}\n- pnpm audit reported high/critical advisories or failed"
          fi

          if [ "${{ steps.osv-scanner.outcome }}" != "success" ]; then
            failed=true
            summary="${summary}\n- OSV-Scanner reported vulnerabilities or failed"
          fi

          if [ "${{ steps.trivy.outcome }}" != "success" ]; then
            failed=true
            summary="${summary}\n- Trivy reported high/critical findings or failed"
          fi

          {
            echo "failed=${failed}"
            echo "summary<<EOF"
            echo -e "${summary}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build audit markdown from JSON
        id: build-markdown
        if: always() && steps.evaluate.outputs.failed == 'true'
        run: |
          gov_status="${{ steps.govulncheck.outcome }}"
          pnpm_status="${{ steps.pnpm-audit.outcome }}"
          osv_status="${{ steps.osv-scanner.outcome }}"
          trivy_status="${{ steps.trivy.outcome }}"

          gov_findings="0"
          if [ -f govulncheck.json ]; then
            gov_findings=$(jq -s '[.[] | select(has("finding"))] | length' govulncheck.json 2>/dev/null || echo "0")
          fi

          pnpm_critical="0"
          pnpm_high="0"
          if [ -f pnpm-audit.json ] && jq -e . pnpm-audit.json >/dev/null 2>&1; then
            pnpm_critical=$(jq -r '.metadata.vulnerabilities.critical // 0' pnpm-audit.json)
            pnpm_high=$(jq -r '.metadata.vulnerabilities.high // 0' pnpm-audit.json)
          fi

          osv_findings="0"
          if [ -f osv-scanner.json ] && jq -e . osv-scanner.json >/dev/null 2>&1; then
            osv_findings=$(jq '[.results[]?.packages[]?.vulnerabilities[]?] | length' osv-scanner.json 2>/dev/null || echo "0")
          fi

          trivy_findings="0"
          if [ -f trivy-results.sarif ] && jq -e . trivy-results.sarif >/dev/null 2>&1; then
            trivy_findings=$(jq '[.runs[]?.results[]?] | length' trivy-results.sarif 2>/dev/null || echo "0")
          fi

          generated_at="$(date -u +"%Y-%m-%d %H:%M:%SZ")"

          {
            echo "## Automated security audit report"
            echo
            echo "Generated at ${generated_at} from workflow run ${{ github.run_id }}."
            echo
            echo "### Summary"
            echo "${{ steps.evaluate.outputs.summary }}"
            echo
            echo "### Findings overview"
            echo "| Scanner | Status | Findings |"
            echo "|---|---|---:|"
            echo "| govulncheck | ${gov_status} | ${gov_findings} |"
            echo "| pnpm audit | ${pnpm_status} | critical=${pnpm_critical}, high=${pnpm_high} |"
            echo "| OSV-Scanner | ${osv_status} | ${osv_findings} |"
            echo "| Trivy (SARIF) | ${trivy_status} | ${trivy_findings} |"
            echo
            echo "### Human-readable highlights"
          } > audit-report.md

          {
            echo "#### govulncheck"
            if [ "$gov_findings" -gt 0 ] 2>/dev/null; then
              jq -sr '.[] | select(has("finding")) | "- Vulnerability \(.finding.osv // "unknown") affects \(.finding.trace[0].module // "unknown module")"' govulncheck.json | sed -n '1,12p'
            else
              echo "- No govulncheck findings parsed from JSON."
            fi
            echo
            echo "#### pnpm audit"
            if [ "$pnpm_critical" -gt 0 ] 2>/dev/null || [ "$pnpm_high" -gt 0 ] 2>/dev/null; then
              echo "- Found ${pnpm_critical} critical and ${pnpm_high} high npm vulnerabilities."
            else
              echo "- No high or critical npm vulnerabilities found."
            fi
            echo
            echo "#### OSV-Scanner"
            if [ "$osv_findings" -gt 0 ] 2>/dev/null; then
              jq -r '.results[]?.packages[]? as $p | $p.vulnerabilities[]? | "- Vulnerability \(.id // "unknown") found in package \($p.package.name // "unknown")"' osv-scanner.json | sed -n '1,12p'
            else
              echo "- No OSV vulnerabilities parsed from JSON."
            fi
            echo
            echo "#### Trivy"
            if [ "$trivy_findings" -gt 0 ] 2>/dev/null; then
              jq -r '.runs[]?.results[]? | "- Rule \(.ruleId // "unknown") in \(.locations[0].physicalLocation.artifactLocation.uri // "unknown file")"' trivy-results.sarif | sed -n '1,12p'
            else
              echo "- No Trivy findings parsed from SARIF JSON."
            fi
            echo
            echo "### Raw artifacts"
            echo "- Artifact: security-audit-reports-${{ github.run_id }}"
            echo "- Files: govulncheck.json, pnpm-audit.json, osv-scanner.json, trivy-results.sarif"
          } >> audit-report.md

          {
            echo "<!-- security-audit-comment -->"
            echo "## Weekly security audit found issues"
            echo
            echo "| Scanner | Findings |"
            echo "|---|---:|"
            echo "| govulncheck | ${gov_findings} |"
            echo "| pnpm audit | critical=${pnpm_critical}, high=${pnpm_high} |"
            echo "| OSV-Scanner | ${osv_findings} |"
            echo "| Trivy | ${trivy_findings} |"
            echo
            echo "### Highlights"
            echo
            if [ "$gov_findings" -gt 0 ] 2>/dev/null; then
              echo "#### govulncheck"
              jq -sr '.[] | select(has("finding")) | "- Vulnerability \(.finding.osv // "unknown") affects \(.finding.trace[0].module // "unknown module")"' govulncheck.json | sed -n '1,8p'
              echo
            fi

            if [ "$pnpm_critical" -gt 0 ] 2>/dev/null || [ "$pnpm_high" -gt 0 ] 2>/dev/null; then
              echo "#### pnpm audit"
              echo "- Found ${pnpm_critical} critical and ${pnpm_high} high npm vulnerabilities."
              echo
            fi

            if [ "$osv_findings" -gt 0 ] 2>/dev/null; then
              echo "#### OSV-Scanner"
              jq -r '.results[]?.packages[]? as $p | $p.vulnerabilities[]? | "- Vulnerability \(.id // "unknown") found in package \($p.package.name // "unknown")"' osv-scanner.json | sed -n '1,8p'
              echo
            fi

            if [ "$trivy_findings" -gt 0 ] 2>/dev/null; then
              echo "#### Trivy"
              jq -r '.runs[]?.results[]? | "- Rule \(.ruleId // "unknown") in \(.locations[0].physicalLocation.artifactLocation.uri // "unknown file")"' trivy-results.sarif | sed -n '1,8p'
              echo
            fi

            echo "See the PR description and workflow artifacts for full details."
          } > audit-pr-comment.md

          mkdir -p .github/security-reports
          cp audit-report.md .github/security-reports/latest-security-audit.md

      - name: Create or update security audit PR
        id: create-pr
        if: always() && steps.evaluate.outputs.failed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(security): refresh weekly audit report"
          branch: automation/security-audit-report
          delete-branch: false
          title: "[Security Audit] Action required"
          body-path: audit-report.md
          add-paths: |
            .github/security-reports/latest-security-audit.md
          labels: |
            security
            dependencies

      - name: Post audit comment on audit PR
        if: always() && steps.evaluate.outputs.failed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- security-audit-comment -->';
            const body = fs.readFileSync('audit-pr-comment.md', 'utf8');
            const issue_number = Number('${{ steps.create-pr.outputs.pull-request-number }}');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Fail workflow on findings
        if: always() && steps.evaluate.outputs.failed == 'true'
        run: |
          echo "Security audit detected issues. See audit PR and artifacts."
          exit 1
