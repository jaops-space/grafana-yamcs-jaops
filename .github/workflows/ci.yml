name: CI

on:
    push:
        branches:
            - master
            - main
    pull_request:
        branches:
            - master
            - main

permissions:
    contents: read

jobs:
    build:
        name: Build, lint and unit tests
        runs-on: ubuntu-latest
        outputs:
            plugin-id: ${{ steps.metadata.outputs.plugin-id }}
            plugin-version: ${{ steps.metadata.outputs.plugin-version }}
            has-e2e: ${{ steps.check-for-e2e.outputs.has-e2e }}
            has-backend: ${{ steps.check-for-backend.outputs.has-backend }}
        env:
            GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
        steps:
            - uses: actions/checkout@v4
            # pnpm action uses the packageManager field in package.json to
            # understand which version to install.
            - uses: pnpm/action-setup@v3
            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Check types
              run: pnpm run typecheck
            - name: Lint
              run: pnpm run lint
            - name: Unit tests
              run: pnpm run test:ci
            - name: Build frontend
              run: |
                  if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
                    pnpm run build --profile --json stats.json
                  else
                    pnpm run build
                  fi

            - name: Check for backend
              id: check-for-backend
              run: |
                  if [ -f "Magefile.go" ]
                  then
                    echo "has-backend=true" >> $GITHUB_OUTPUT
                  fi

            - name: Setup Go environment
              if: steps.check-for-backend.outputs.has-backend == 'true'
              uses: actions/setup-go@v5
              with:
                  go-version: '1.25.7'

            - name: Test backend
              if: steps.check-for-backend.outputs.has-backend == 'true'
              uses: magefile/mage-action@v3
              with:
                  version: latest
                  args: coverage

            - name: Build backend
              if: steps.check-for-backend.outputs.has-backend == 'true'
              uses: magefile/mage-action@v3
              with:
                  version: latest
                  args: buildAll

            - name: Check for E2E
              id: check-for-e2e
              run: |
                  if [ -f "playwright.config.ts" ]
                  then
                    echo "has-e2e=true" >> $GITHUB_OUTPUT
                  fi

            - name: Sign plugin
              run: pnpm run sign
              if: ${{ vars.REPO_VAR_SIGNING_ENABLED == 'true' && env.GRAFANA_ACCESS_POLICY_TOKEN != '' }}

            - name: Get plugin metadata
              id: metadata
              run: |
                  sudo apt-get install jq

                  export GRAFANA_PLUGIN_ID=$(cat dist/plugin.json | jq -r .id)
                  export GRAFANA_PLUGIN_VERSION=$(cat dist/plugin.json | jq -r .info.version)
                  export GRAFANA_PLUGIN_ARTIFACT=${GRAFANA_PLUGIN_ID}-${GRAFANA_PLUGIN_VERSION}.zip

                  echo "plugin-id=${GRAFANA_PLUGIN_ID}" >> $GITHUB_OUTPUT
                  echo "plugin-version=${GRAFANA_PLUGIN_VERSION}" >> $GITHUB_OUTPUT
                  echo "archive=${GRAFANA_PLUGIN_ARTIFACT}" >> $GITHUB_OUTPUT

            - name: Package plugin
              id: package-plugin
              run: |
                  mv dist ${{ steps.metadata.outputs.plugin-id }}
                  zip ${{ steps.metadata.outputs.archive }} ${{ steps.metadata.outputs.plugin-id }} -r

            - name: Check plugin.json
              run: |
                  docker run --pull=always \
                    -v $PWD/${{ steps.metadata.outputs.archive }}:/archive.zip \
                    grafana/plugin-validator-cli -analyzer=metadatavalid /archive.zip

            - name: Archive Build
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.metadata.outputs.plugin-id }}-${{ steps.metadata.outputs.plugin-version }}
                  path: ${{ steps.metadata.outputs.plugin-id }}
                  retention-days: 5

            - name: Upload stats.json artifact
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@v4
              with:
                  name: main-branch-stats
                  path: stats.json
                  overwrite: true

    resolve-versions:
        name: Resolve e2e images
        runs-on: ubuntu-latest
        timeout-minutes: 3
        needs: build
        if: ${{ needs.build.outputs.has-e2e == 'true' }}
        outputs:
            matrix: ${{ steps.resolve-versions.outputs.matrix }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Resolve Grafana E2E versions
              id: resolve-versions
              uses: grafana/plugin-actions/e2e-version@main

    yamcs-integration:
        name: Yamcs integration tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build
        steps:
            - uses: actions/checkout@v4

            - name: Setup Go environment
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Start Yamcs quickstart
              run: |
                  git clone --depth 1 https://github.com/jaops-space/yamcs-quickstart.git /tmp/yamcs-quickstart
                  docker compose -f /tmp/yamcs-quickstart/docker/docker-compose.yml up -d --build

            - name: Wait for Yamcs readiness
              run: |
                  for i in $(seq 1 120); do
                    if curl -fsS http://localhost:8090/api/instances >/tmp/yamcs_instances.json; then
                      cat /tmp/yamcs_instances.json
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "Yamcs did not become ready in time"
                  docker compose -f /tmp/yamcs-quickstart/docker/docker-compose.yml logs || true
                  exit 1

            - name: Run Yamcs integration tests
              env:
                  YAMCS_ADDRESS: localhost:8090
              run: go test -tags=integration ./pkg/yamcs/client/integration -run Integration -v -count=1

            - name: Dump Yamcs logs on failure
              if: ${{ failure() }}
              run: docker compose -f /tmp/yamcs-quickstart/docker/docker-compose.yml logs > yamcs-integration.log

            - name: Upload Yamcs logs
              if: ${{ failure() }}
              uses: actions/upload-artifact@v4
              with:
                  name: yamcs-integration-logs-${{ github.run_id }}
                  path: yamcs-integration.log
                  retention-days: 7

            - name: Stop Yamcs quickstart
              if: always()
              run: docker compose -f /tmp/yamcs-quickstart/docker/docker-compose.yml down -v

    playwright-tests:
        needs: [resolve-versions, build, yamcs-integration]
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                GRAFANA_IMAGE: ${{fromJson(needs.resolve-versions.outputs.matrix)}}
        name: e2e test ${{ matrix.GRAFANA_IMAGE.name }}@${{ matrix.GRAFANA_IMAGE.VERSION }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Download plugin
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  name: ${{ needs.build.outputs.plugin-id }}-${{ needs.build.outputs.plugin-version }}

            - name: Execute permissions on binary
              if: needs.build.outputs.has-backend == 'true'
              run: |
                  chmod +x ./dist/gpx_*

            # pnpm action uses the packageManager field in package.json to
            # understand which version to install.
            - uses: pnpm/action-setup@v3
            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Install dev dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Start Grafana
              run: |
                  docker compose pull
                  GF_LOG_LEVEL=debug ANONYMOUS_AUTH_ENABLED=false DEVELOPMENT=false GRAFANA_VERSION=${{ matrix.GRAFANA_IMAGE.VERSION }} GRAFANA_IMAGE=${{ matrix.GRAFANA_IMAGE.NAME }} docker compose up -d

            - name: Start Yamcs quickstart
              run: |
                  git clone --depth 1 https://github.com/jaops-space/yamcs-quickstart.git /tmp/yamcs-quickstart
                  docker compose -f /tmp/yamcs-quickstart/docker/docker-compose.yml up -d --build

            - name: Wait for Yamcs readiness
              run: |
                  for i in $(seq 1 120); do
                    if curl -fsS http://localhost:8090/api/instances >/dev/null; then
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "Yamcs did not become ready in time"
                  docker compose -f /tmp/yamcs-quickstart/docker/docker-compose.yml logs || true
                  exit 1

            - name: Start Yamcs quickstart simulators
              run: |
                  nohup python3 /tmp/yamcs-quickstart/simulator.py > /tmp/yamcs-simulator.log 2>&1 &

            - name: Check if Grafana container is running
              run: |
                  sleep 10
                  docker ps -a
                  echo "=== Grafana container logs ==="
                  docker logs jaops-yamcs-app || true

            - name: Wait for grafana server
              uses: grafana/plugin-actions/wait-for-grafana@main
              with:
                  url: http://localhost:3000/login
                  timeout: 120

            - name: Install Playwright Browsers
              run: pnpm exec playwright install chromium --with-deps

            - name: Run Playwright tests
              id: run-tests
              run: pnpm run e2e

            - name: Docker logs
              if: ${{ always() && steps.run-tests.outcome == 'failure' }}
              run: |
                  docker logs jaops-yamcs-app >& grafana-server.log
                  cat /tmp/yamcs-simulator.log > yamcs-simulator.log || true

            - name: Stop grafana docker
              if: always()
              run: |
                  docker compose down
                  docker compose -f /tmp/yamcs-quickstart/docker/docker-compose.yml down -v

            - name: Upload server log
              uses: actions/upload-artifact@v4
              if: ${{ always() && steps.run-tests.outcome == 'failure' }}
              with:
                  name: ${{ matrix.GRAFANA_IMAGE.NAME }}-v${{ matrix.GRAFANA_IMAGE.VERSION }}-${{github.run_id}}-server-log
                  path: |
                    grafana-server.log
                    yamcs-simulator.log
                  retention-days: 5

            # Uncomment this step to upload the Playwright report to Github artifacts.
            # If your repository is public, the report will be public on the Internet so beware not to expose sensitive information.
            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              if: ${{ always() && steps.run-tests.outcome == 'failure' }}
              with:
                name: playwright-report-${{ matrix.GRAFANA_IMAGE.NAME }}-v${{ matrix.GRAFANA_IMAGE.VERSION }}-${{github.run_id}}
                path: playwright-report/
                retention-days: 5
